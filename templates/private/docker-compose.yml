---
x-besu-def:
  &besu-def
  restart: "on-failure"
  image: hyperledger/besu:${BESU_VERSION:-latest}
  env_file:
    - ./config/besu/.env
  entrypoint:
    - /bin/bash
    - -c
    - |

      cp "/config/${BESU_CONS_ALGO:-QBFT}genesis.json" /config/genesis.json

      /opt/besu/bin/besu \
      --config-file=/config/config.toml \
      --p2p-host=$$(hostname -i) \
      --rpc-http-api=WEB3,ETH,NET,TRACE,DEBUG,ADMIN,TXPOOL,PERM,${BESU_CONS_ALGO:-QBFT} \
      --rpc-ws-api=WEB3,ETH,NET,TRACE,DEBUG,ADMIN,TXPOOL,PERM,${BESU_CONS_ALGO:-QBFT} ;


services:

  validator1:
    << : *besu-def
    ports:
      - 21001:8545/tcp
      - 30303
      - 9545
    environment:
      - OTEL_RESOURCE_ATTRIBUTES=service.name=validator1,service.version=${BESU_VERSION:-latest}
    labels:
      - "consensus=besu"
    volumes:
      - ./config/besu/:/config
      - ./config/nodes/validator1:/opt/besu/keys
      - ./logs/besu:/tmp/besu
    networks:
      besu-dev-quickstart:
        ipv4_address: 172.16.239.11

  validator2:
    << : *besu-def
    ports:
      - 21002:8545/tcp
      - 30303
      - 9545
    environment:
      - OTEL_RESOURCE_ATTRIBUTES=service.name=validator2,service.version=${BESU_VERSION:-latest}
    labels:
      - "consensus=besu"
    volumes:
      - ./config/besu/:/config
      - ./config/nodes/validator2:/opt/besu/keys
      - ./logs/besu:/tmp/besu
    depends_on:
      - validator1
    networks:
      besu-dev-quickstart:
        ipv4_address: 172.16.239.12

  validator3:
    << : *besu-def
    ports:
      - 21003:8545/tcp
      - 30303
      - 9545
    environment:
      - OTEL_RESOURCE_ATTRIBUTES=service.name=validator3,service.version=${BESU_VERSION:-latest}
    labels:
      - "consensus=besu"
    volumes:
      - ./config/besu/:/config
      - ./config/nodes/validator3:/opt/besu/keys
      - ./logs/besu:/tmp/besu
    depends_on:
      - validator1
    networks:
      besu-dev-quickstart:
        ipv4_address: 172.16.239.13

  validator4:
    << : *besu-def
    ports:
      - 21004:8545/tcp
      - 30303
      - 9545
    environment:
      - OTEL_RESOURCE_ATTRIBUTES=service.name=validator4,service.version=${BESU_VERSION:-latest}
    labels:
      - "consensus=besu"
    volumes:
      - ./config/besu/:/config
      - ./config/nodes/validator4:/opt/besu/keys
      - ./logs/besu:/tmp/besu
    depends_on:
      - validator1
    networks:
      besu-dev-quickstart:
        ipv4_address: 172.16.239.14

  rpcnode:
    << : *besu-def
    container_name: rpcnode
    environment:
      - OTEL_RESOURCE_ATTRIBUTES=service.name=rpcnode,service.version=${BESU_VERSION:-latest}
    volumes:
      - ./config/besu/:/config
      - ./config/nodes/rpcnode:/opt/besu/keys
      - ./logs/besu:/tmp/besu
    depends_on:
      - validator1
    ports:
      - 8545:8545/tcp
      - 8546:8546/tcp
    networks:
      besu-dev-quickstart:
        ipv4_address: 172.16.239.15

{% if chainlens %}

  chainlensapi:
    image: web3labs/epirus-free-api:latest
    container_name: chainlensapi
    environment:
      - NODE_ENDPOINT=http://rpcnode:8545
      - MONGO_CLIENT_URI=mongodb://chainlensmongodb:27017
      - REINDEX_ENDPOINT=http://chainlensingestion/reindex/
      - MONGO_DB_NAME=epirus
      - MONGO_CREATE_INDICES=true
      - REDIS_HOST=chainlensredis
      - REDIS_PORT=6379
    depends_on:
      - chainlensmongodb
      - chainlensredis
    networks:
      besu-dev-quickstart:
        ipv4_address: 172.16.239.51

  chainlensmongodb:
    image: mongo:5.0.8
    container_name: chainlensmongodb
    environment:
      - COMPOSE_HTTP_TIMEOUT=900
      - DOCKER_CLIENT_TIMEOUT=900
    entrypoint: mongod --bind_ip "0.0.0.0"    
    networks:
      besu-dev-quickstart:
        ipv4_address: 172.16.239.52

  chainlensredis:
    image: redis
    restart: unless-stopped
    container_name: chainlensredis
    networks:
      besu-dev-quickstart:
        ipv4_address: 172.16.239.53

  chainlensweb:
    image: web3labs/epirus-free-web:latest
    container_name: chainlensweb
    environment:
      - API_URL=/api
      - WS_API_URL=ws://localhost:8090
      - DISPLAY_NETWORK_TAB=disabled
    depends_on:
      - chainlensapi
    networks:
      besu-dev-quickstart:
        ipv4_address: 172.16.239.55

  chainlensingestion:
    image: web3labs/epirus-free-ingestion:latest
    container_name: chainlensingestion
    environment:
      - NODE_ENDPOINT=http://rpcnode:8545
      - MONGO_CLIENT_URI=mongodb://chainlensmongodb:27017
      - MONGO_DB_NAME=epirus
      - LIST_OF_METRICS_TO_CALCULATE_PER_MINUTE=hourly,daily,monthly,yearly
    depends_on:
      - chainlensmongodb
      - chainlensredis
      - rpcnode
    networks:
      besu-dev-quickstart:
        ipv4_address: 172.16.239.54

  chainlensnginx:
    image: nginx:latest
    container_name: chainlensnginx
    volumes:
      - ./config/chainlens/nginx.conf:/etc/nginx/nginx.conf
      - ./config/chainlens/5xx.html:/www/error_pages/5xx.html
    ports:
      - 8081:80
    depends_on:
      - chainlensapi
      - chainlensweb
    networks:
      besu-dev-quickstart:
        ipv4_address: 172.16.239.56


{% endif %}

  prometheus:
    image: "prom/prometheus:v3.10.0"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-remote-write-receiver
    ports:
      - 9090:9090/tcp
    networks:
      besu-dev-quickstart:
        ipv4_address: 172.16.239.32

  grafana:
    image: "grafana/grafana:12.3"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_USERS_VIEWERS_CAN_EDIT=true
    volumes:
      - ./config/grafana/provisioning/:/etc/grafana/provisioning/
      - grafana:/var/lib/grafana
    ports:
      - 3000:3000/tcp
    networks:
      besu-dev-quickstart:
        ipv4_address: 172.16.239.33

  loki:
    image: "grafana/loki:3.5.12"
    volumes:
      - ./config/loki/loki.yml:/etc/loki/local-config.yaml:ro
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - 3100:3100/tcp
    networks:
      besu-dev-quickstart:
        ipv4_address: 172.16.239.34

  alloy:
    image: "grafana/alloy:latest"
    ports:
      - 12345:12345/tcp
    volumes:
      - ./logs/besu:/var/log/besu:ro
      - ./config/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - alloy:/var/lib/alloy/data
    command: 
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    networks:
      besu-dev-quickstart:
        ipv4_address: 172.16.239.35

{% if otel %}

  otel-agent-downloader:
    image: curlimages/curl:latest
    volumes:
      - ./config/besu/otel:/otel
    command: >-
      -sSfL --create-dirs -o /otel/opentelemetry-javaagent.jar
      https://github.com/open-telemetry/opentelemetry-java-instrumentation/releases/latest/download/opentelemetry-javaagent.jar
    restart: "no"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel-config.yaml"]
    volumes:
      - ./config/otel-collector/otel-config.yaml:/etc/otel-config.yaml
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus exporter
    depends_on:
      - prometheus
      - tempo
    networks:
      besu-dev-quickstart:
        ipv4_address: 172.16.239.36

  tempo:
    image: "grafana/tempo:2.6.1"
    command: ["-config.file=/etc/tempo.yml"]
    volumes:
      - ./config/tempo/tempo.yml:/etc/tempo.yml:ro
      - tempo:/var/tempo
    ports:
      - "3200:3200"   # Tempo HTTP API (Grafana datasource)
    networks:
      besu-dev-quickstart:
        ipv4_address: 172.16.239.37

{% endif %}

volumes:
  public-keys:
  prometheus:
  grafana:
  alloy:
  tempo:
  
networks:
  besu-dev-quickstart:
    name: besu-dev-quickstart
    driver: bridge
    ipam:
      config:
        - subnet: 172.16.239.0/24
